<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>selections — loading screen</title>
  <style>
    :root {
      --charcoal: #16201F;
      --teal: #008080;
      --paper: #F6F8F7;
      --stroke-dur: 3.8s;
      --step: 0.05s;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      height: 100%
    }

    body {
      background: var(--charcoal);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: "IBM Plex Mono", ui-monospace, monospace;
    }

    /* a soft teal glow bleeding from one corner — the one atmospheric touch */
    body::before {
      content: "";
      position: fixed;
      top: -220px;
      right: -220px;
      width: 680px;
      height: 680px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 128, 128, .16), transparent 62%);
      pointer-events: none;
    }

    .stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
      position: relative
    }

    .logo {
      width: clamp(280px, 58vw, 560px);
      height: auto;
      display: block;
      overflow: visible
    }

    /* ---- the wordmark letters draw themselves ---- */
    .logo .draw {
      fill: #fff;
      stroke: #fff;
      stroke-width: 2;
      stroke-dasharray: 1;
      /* normalised by pathLength="1" */
      stroke-dashoffset: 1;
      fill-opacity: 0;
      opacity: 0;
      animation: draw var(--stroke-dur) linear infinite;
      animation-delay: calc((var(--i) - 9) * var(--step));
    }

    /* ---- the teal squares land last ---- */
    .logo .sq {
      fill: var(--teal);
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
      transform: scale(.3);
      animation: pop var(--stroke-dur) ease-out infinite;
    }

    /* ---- the small HR Services line fades up ---- */
    .logo .sub {
      fill: #fff;
      opacity: 0;
      animation: fadeSub var(--stroke-dur) ease infinite;
    }

    /* thin teal progress hairline under the mark */
    .track {
      width: clamp(280px, 58vw, 560px);
      height: 1px;
      background: rgba(255, 255, 255, .12);
      position: relative;
      overflow: hidden;
    }

    .track::after {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--teal);
      transform-origin: left;
      transform: scaleX(0);
      animation: track var(--stroke-dur) ease infinite;
    }

    .caption {
      font-size: 10px;
      letter-spacing: .34em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .34);
    }

    @keyframes draw {
      0% {
        opacity: 0;
        stroke-dashoffset: 1;
        fill-opacity: 0
      }

      3% {
        opacity: 1;
        stroke-dashoffset: 1;
        fill-opacity: 0
      }

      22% {
        opacity: 1;
        stroke-dashoffset: 0;
        fill-opacity: 0
      }

      30% {
        opacity: 1;
        stroke-dashoffset: 0;
        fill-opacity: 1
      }

      82% {
        opacity: 1;
        stroke-dashoffset: 0;
        fill-opacity: 1
      }

      90% {
        opacity: 0;
        stroke-dashoffset: 0;
        fill-opacity: 1
      }

      91% {
        opacity: 0;
        stroke-dashoffset: 1;
        fill-opacity: 0
      }

      100% {
        opacity: 0;
        stroke-dashoffset: 1;
        fill-opacity: 0
      }
    }

    @keyframes pop {
      0% {
        opacity: 0;
        transform: scale(.3)
      }

      27% {
        opacity: 0;
        transform: scale(.3)
      }

      33% {
        opacity: 1;
        transform: scale(1)
      }

      82% {
        opacity: 1;
        transform: scale(1)
      }

      90% {
        opacity: 0;
        transform: scale(1)
      }

      100% {
        opacity: 0;
        transform: scale(.3)
      }
    }

    @keyframes fadeSub {
      0% {
        opacity: 0
      }

      34% {
        opacity: 0
      }

      44% {
        opacity: 1
      }

      82% {
        opacity: 1
      }

      90% {
        opacity: 0
      }

      100% {
        opacity: 0
      }
    }

    @keyframes track {
      0% {
        transform: scaleX(0);
        opacity: 0
      }

      3% {
        opacity: 1
      }

      24% {
        transform: scaleX(1)
      }

      82% {
        transform: scaleX(1);
        opacity: 1
      }

      90% {
        transform: scaleX(1);
        opacity: 0
      }

      91% {
        transform: scaleX(0);
        opacity: 0
      }

      100% {
        transform: scaleX(0);
        opacity: 0
      }
    }

    /* show a calm, fully-formed mark for anyone who prefers no motion */
    @media (prefers-reduced-motion: reduce) {
      .logo .draw {
        opacity: 1;
        fill-opacity: 1;
        stroke-dashoffset: 0;
        animation: none
      }

      .logo .sq {
        opacity: 1;
        transform: none;
        animation: none
      }

      .logo .sub {
        opacity: 1;
        animation: none
      }

      .track::after {
        transform: scaleX(1);
        opacity: 1;
        animation: none
      }
    }
  </style>
</head>
